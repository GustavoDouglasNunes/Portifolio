<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - Gustavo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .login-body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
        url("assets/Blue_particle_tech_abstract_art_background_2880x1800.jpg");

      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .card-login {
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }

    .perfil-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 3px solid #fff;
    }

    .titulo-login {
      background: linear-gradient(45deg, #1877f2, #00c6ff);
      font-size: 1.4rem;
    }

    /* SENHA CORRIGIDA */
    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      padding-right: 90px;
    }

    .btn-mostrar {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: none;
      background: linear-gradient(45deg, #1877f2, #00c6ff);
      color: white;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-mostrar:hover {
      opacity: 0.9;
    }

    .btn-login {
      background: linear-gradient(45deg, #1877f2, #00c6ff);
      color: white;
      border: none;
      width: 100%;
      max-width: 220px;
      transition: 0.3s;
    }

    .btn-login:hover {
      transform: scale(1.03);
    }

    .btn-criar {
      background: transparent;
      border: 1px solid #1877f2;
      color: #1877f2;
      transition: 0.3s;
    }

    .btn-criar:hover {
      background: linear-gradient(45deg, #1877f2, #00c6ff);
      color: white;
    }
  </style>
</head>

<body class="login-body d-flex justify-content-center align-items-center px-3">

  <div class="card card-login shadow-lg border-0 rounded-4 p-4 bg-white bg-opacity-75" style="max-width: 380px; width: 100%;">

    <!-- PERFIL -->
    <div class="text-center mb-4">

      <img src="assets/1772426236844.jpeg" class="perfil-img rounded-circle shadow mb-3">

      <p class="text-secondary small mb-3">
        Digite seu e-mail e senha para acessar.
      </p>

      <h2 class="titulo-login text-white py-2 rounded-3 fw-bold shadow-sm">
        Acesso ao Perfil
      </h2>

    </div>

    <!-- FORM -->
    <form id="loginForm">

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" id="email" class="form-control rounded-3 py-2" required>
      </div>

      <!-- SENHA -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Senha</label>

        <div class="input-wrapper">
          <input type="password" id="senha" class="form-control rounded-3 py-2" required>

          <button type="button" class="btn-mostrar" onclick="mostrarSenha()" id="btnSenha">
            Mostrar
          </button>
        </div>
      </div>

      <!-- TERMOS (FORA DA SENHA) -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" required>
        <label class="form-check-label">Aceito os termos</label>
      </div>

      <!-- BOTÕES -->
      <div class="d-flex flex-column align-items-center gap-2">

        <button type="submit" class="btn btn-login py-2 rounded-3 fw-bold shadow-sm">
          Login
        </button>

        <button type="button" class="btn btn-criar py-1 px-3 rounded-3 fw-bold shadow-sm">
          Criar Acesso
        </button>

      </div>

    </form>

  </div>

  <script>
    function mostrarSenha() {
      const senha = document.getElementById("senha");
      const btn = document.getElementById("btnSenha");

      if (senha.type === "password") {
        senha.type = "text";
        btn.innerText = "Ocultar";
      } else {
        senha.type = "password";
        btn.innerText = "Mostrar";
      }
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      localStorage.setItem("usuarioEmail", email);

      window.location.href = "portfolio.html";
    });
  </script>

</body>

</html>
